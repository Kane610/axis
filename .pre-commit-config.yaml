repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args:
          - --fix
      - id: ruff-format
        args:
          - --target-version=py314
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        language_version: python3.14
        additional_dependencies: [
          "httpx==0.28.1",
          "orjson==3.11.5",
          "packaging==25.0",
          "types-xmltodict==v1.0.1.20260113"
        ]
        exclude: ^tests/
